# https://jekyllrb.com/docs/configuration/options/

# Paginate
paginate: 10
paginate_path: /page:num

##### 一些本地测试开关, 其中livereload在上传时应设为false #####
livereload: true
open_url: true

timezone: Asia/Shanghai

include: [_pages]
permalink: "/:categories/:title:output_ext"

###### 自定义区域 Liquid配置 使用形如 site.xxx #####
title: INFINITY 中文如何呢

# Author settings
author:
  name: clearoce
  github: clearoce
  email: clearoce315@gmail.com
  description: A Ghost

plugins:
  - jekyll-avatar
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
